# Production docker-compose for GCP deployment.
# Key difference from dev: webrtc-gateway uses host networking so WebRTC
# ephemeral UDP ports are directly accessible from the internet.
#
# Usage on GCP VM:
#   docker compose -f docker-compose.prod.yml up -d
#
# Also requires GCP firewall rule to allow UDP ingress (10000-65535).

services:
  control-plane:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # With gateway in host mode, reach it via host's loopback
      - GATEWAY_INTERNAL_URL=http://host.docker.internal:9091
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - asr
      - tts
    restart: unless-stopped

  webrtc-gateway:
    build:
      context: .
      dockerfile: webrtc-gateway/Dockerfile
    network_mode: host
    environment:
      - LISTEN_ADDR=:9090
      - INTERNAL_API_ADDR=:9091
      - METRICS_ADDR=:9092
      # ASR/TTS are in bridge network, reach via host-mapped ports
      - ASR_ADDR=127.0.0.1:50051
      - TTS_ADDR=127.0.0.1:50052
      - MAX_SESSIONS=100
      - MAX_INFERENCE_CONCURRENCY=4
      - ACTION_TIMEOUT_SEC=60
      - MAX_LOOKBACK_SEC=60
      - RING_BUFFER_SEC=60
      - MAX_INGEST_DURATION_SEC=1800
    depends_on:
      - asr
      - tts
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2"

  asr:
    build:
      context: .
      dockerfile: inference/asr/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - WHISPER_MODEL_SIZE=medium
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - TRANSLATION_ENABLED=true
      - NLLB_MODEL_PATH=/app/models/nllb-200-distilled-600M-ct2-int8
      - TRANSLATE_TIMEOUT_MS=250
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "2"

  tts:
    build:
      context: .
      dockerfile: inference/tts/Dockerfile
    ports:
      - "50052:50052"
    environment:
      - GRPC_PORT=50052
      - TTS_MODELS_DIR=/app/models
      - TTS_DEVICE=cpu
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  web-client:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./clients/web:/usr/share/nginx/html:ro
    depends_on:
      - control-plane
    restart: unless-stopped
